<style>
/* ── COLOR & TYPE TOKENS ──────────────────────────────────── */
:root {
  --fc-red:            #D8262A;
  --fc-red-deep:       #B81B1F;
  --fc-red-hover:      #E8393D;
  --fc-yellow:         #FBE51B;
  --fc-yellow-deep:    #E6C800;
  --fc-green:          #5BB336;
  --fc-green-deep:     #449128;
  --fc-navy-900:       #0A1628;
  --fc-navy-800:       #122036;
  --fc-navy-700:       #1B2C46;
  --fc-navy-600:       #2A3D5A;
  --fc-white:          #FFFFFF;
  --fc-ink-50:         #F7F7F8;
  --fc-ink-100:        #EFEFF1;
  --fc-ink-200:        #E2E3E7;
  --fc-ink-300:        #C9CBD2;
  --fc-ink-400:        #8E919A;
  --fc-ink-500:        #5F6470;
  --fc-ink-700:        #2E3340;
  --fc-ink-900:        #15171E;
  --fc-success:        var(--fc-green);
  --fc-success-soft:   #E8F5E0;
  --fc-warning:        var(--fc-yellow);
  --fc-warning-soft:   #FFF7C2;
  --fc-danger:         var(--fc-red);
  --fc-danger-soft:    #FFE3E3;
  --fc-info:           #2A6FDB;
  --fc-info-soft:      #E3EEFC;
  --bg-page:           transparent;
  --bg-subtle:         rgba(247,247,248,0.55);
  --bg-section:        rgba(239,239,241,0.6);
  --bg-dark:           var(--fc-navy-900);
  --bg-brand:          var(--fc-red);
  --fg-default:        var(--fc-ink-700);
  --fg-strong:         var(--fc-ink-900);
  --fg-muted:          var(--fc-ink-500);
  --fg-on-brand:       var(--fc-white);
  --fg-on-dark:        var(--fc-white);
  --fg-link:           var(--fc-red);
  --border-soft:       var(--fc-ink-200);
  --border-strong:     var(--fc-ink-300);
  --border-on-dark:    var(--fc-navy-600);
  --shadow-sm:    0 1px 2px rgba(10,22,40,0.06), 0 1px 1px rgba(10,22,40,0.04);
  --shadow-md:    0 4px 12px rgba(10,22,40,0.08), 0 1px 2px rgba(10,22,40,0.04);
  --shadow-lg:    0 12px 28px rgba(10,22,40,0.12), 0 4px 8px rgba(10,22,40,0.06);
  --shadow-cta:   0 8px 20px rgba(216,38,42,0.24), 0 2px 4px rgba(216,38,42,0.16);
  --shadow-cta-hover: 0 12px 28px rgba(216,38,42,0.32), 0 4px 8px rgba(216,38,42,0.20);
  --radius-xs:    4px;
  --radius-sm:    8px;
  --radius-md:    12px;
  --radius-lg:    16px;
  --radius-xl:    24px;
  --radius-pill:  999px;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;
  --space-6:32px;--space-7:48px;--space-8:64px;--space-9:96px;--space-10:128px;
  --container-max:     1200px;
  --container-wide:    1320px;
  --gutter-mobile:     16px;
  --gutter-desktop:    24px;
  --section-y-mobile:  48px;
  --section-y-desktop: 96px;
  --font-display: "Montserrat","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-body:    "Montserrat","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-ui:      "Inter","Montserrat",system-ui,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,monospace;
  --fs-display:   clamp(40px,6vw,72px);
  --fs-h1:        clamp(32px,4.4vw,52px);
  --fs-h2:        clamp(26px,3.2vw,40px);
  --fs-h3:        clamp(22px,2.4vw,30px);
  --fs-h4:        20px;
  --fs-h5:        18px;
  --fs-body-lg:   18px;
  --fs-body:      16px;
  --fs-body-sm:   14px;
  --fs-meta:      13px;
  --fs-eyebrow:   12px;
  --lh-tight:     1.05;
  --lh-snug:      1.2;
  --lh-normal:    1.5;
  --lh-relaxed:   1.65;
  --tracking-tight:   -0.02em;
  --tracking-eyebrow: 0.14em;
  --ease-out:    cubic-bezier(0.2,0.7,0.2,1);
  --ease-in-out: cubic-bezier(0.4,0,0.2,1);
  --t-fast:      120ms;
  --t-base:      200ms;
  --t-slow:      320ms;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-body);font-size:var(--fs-body);
  line-height:var(--lh-relaxed);color:var(--fg-default);
  background:#ffffff;-webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(to right, #e8e8e8 1px, transparent 1px),
    linear-gradient(to bottom, #e8e8e8 1px, transparent 1px),
    radial-gradient(circle 800px at 0% 300px, rgba(216,38,42,0.12), transparent),
    radial-gradient(circle 700px at 100% 300px, rgba(216,38,42,0.08), transparent);
  background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
}
#root{position:relative;z-index:1;}
a{color:var(--fg-link);text-decoration:none;}
a:hover{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px;}
::selection{background:var(--fc-red);color:var(--fc-white);}
h1,h2,h3,h4{margin:0;}

.fc-eyebrow{
  font-family:var(--font-display);font-size:var(--fs-eyebrow);
  font-weight:700;letter-spacing:var(--tracking-eyebrow);
  text-transform:uppercase;color:var(--fc-red);
}
.fc-on-dark .fc-eyebrow{color:var(--fc-yellow);}

/* ── BUTTONS ──────────────────────────────────────────────── */
.fc-btn{
  --_h:48px;--_px:24px;
  display:inline-flex;align-items:center;justify-content:center;
  gap:10px;height:var(--_h);padding:0 var(--_px);
  border-radius:var(--radius-pill);border:0;cursor:pointer;
  font-family:var(--font-display);font-size:15px;font-weight:700;
  letter-spacing:0.01em;line-height:1;text-decoration:none;white-space:nowrap;
  transition:transform var(--t-fast) var(--ease-out),
             background var(--t-fast) var(--ease-out),
             box-shadow var(--t-base) var(--ease-out),color var(--t-fast);
  user-select:none;
}
.fc-btn:focus-visible{outline:3px solid var(--fc-red);outline-offset:3px;}
.fc-btn:active{transform:translateY(1px);}
.fc-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.fc-btn--sm{--_h:36px;--_px:16px;font-size:13px;}
.fc-btn--lg{--_h:56px;--_px:32px;font-size:17px;}
.fc-btn--primary{background:var(--fc-red);color:var(--fc-white);box-shadow:var(--shadow-cta);}
.fc-btn--primary:hover{background:var(--fc-red-hover);box-shadow:var(--shadow-cta-hover);text-decoration:none;}
.fc-btn--primary:active{background:var(--fc-red-deep);}
.fc-btn--dark{background:var(--fc-navy-900);color:var(--fc-white);}
.fc-btn--dark:hover{background:var(--fc-navy-800);text-decoration:none;}
.fc-btn--ghost{background:transparent;color:var(--fc-ink-900);border:1.5px solid var(--fc-ink-300);}
.fc-btn--ghost:hover{border-color:var(--fc-ink-900);background:var(--fc-ink-50);text-decoration:none;}
.fc-btn--inverse{background:var(--fc-white);color:var(--fc-red);}
.fc-btn--inverse:hover{background:rgba(255,255,255,0.92);text-decoration:none;}
.fc-btn--whatsapp{background:var(--fc-green);color:var(--fc-white);}
.fc-btn--whatsapp:hover{background:var(--fc-green-deep);text-decoration:none;}
.fc-btn--block{width:100%;}

/* ── BADGES ───────────────────────────────────────────────── */
.fc-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--radius-pill);
  font-family:var(--font-display);font-size:12px;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;line-height:1;
}
.fc-badge--red    {background:var(--fc-red);color:var(--fc-white);}
.fc-badge--yellow {background:var(--fc-yellow);color:var(--fc-navy-900);}
.fc-badge--green  {background:var(--fc-green);color:var(--fc-white);}
.fc-badge--dark   {background:var(--fc-navy-900);color:var(--fc-white);}
.fc-badge--soft-red    {background:var(--fc-danger-soft);color:var(--fc-red-deep);}
.fc-badge--soft-green  {background:var(--fc-success-soft);color:var(--fc-green-deep);}
.fc-badge--soft-yellow {background:var(--fc-warning-soft);color:#6B5800;}
.fc-badge--outline{background:transparent;color:var(--fc-ink-700);box-shadow:inset 0 0 0 1.5px var(--fc-ink-300);}

/* ── CARDS ────────────────────────────────────────────────── */
.fc-card{
  background:#fff;border-radius:var(--radius-md);
  border:1px solid var(--border-soft);padding:var(--space-5);
  transition:box-shadow var(--t-base) var(--ease-out),
             transform var(--t-base) var(--ease-out),
             border-color var(--t-base) var(--ease-out);
}
.fc-card--lift:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--fc-ink-300);}
.fc-card--feature{background:var(--fc-white);border-radius:var(--radius-lg);border:1px solid var(--border-soft);padding:var(--space-6);box-shadow:var(--shadow-sm);}
.fc-card--dark{background:var(--fc-navy-800);border-radius:var(--radius-lg);border:1px solid var(--fc-navy-600);padding:var(--space-6);color:var(--fc-white);}
.fc-card--brand{background:var(--fc-red);border-radius:var(--radius-lg);padding:var(--space-6);color:var(--fc-white);border:0;}
.fc-card--brand .fc-eyebrow{color:var(--fc-yellow);}

/* Unit card */
.fc-unit-card{background:var(--fc-white);border:1px solid var(--border-soft);border-radius:var(--radius-md);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow var(--t-base) var(--ease-out),transform var(--t-base) var(--ease-out);}
.fc-unit-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.fc-unit-card__media{aspect-ratio:16/10;background:var(--fc-ink-100);position:relative;overflow:hidden;}
.fc-unit-card__media>img{width:100%;height:100%;object-fit:cover;display:block;}
.fc-unit-card__flag{position:absolute;top:12px;left:12px;}
.fc-unit-card__body{padding:20px;display:flex;flex-direction:column;gap:12px;flex:1;}
.fc-unit-card__title{font-weight:700;font-size:18px;color:var(--fg-strong);}
.fc-unit-card__meta{font-size:14px;color:var(--fg-muted);display:flex;gap:8px;align-items:flex-start;}
.fc-unit-card__meta i{flex-shrink:0;margin-top:2px;color:var(--fc-red);}
.fc-unit-card__cta{margin-top:auto;}

/* Step card */
.fc-step{background:var(--fc-white);border:1px solid var(--border-soft);border-radius:var(--radius-md);padding:24px;position:relative;display:flex;flex-direction:column;gap:12px;}
.fc-step__num{font-family:var(--font-display);font-size:40px;font-weight:800;line-height:1;color:var(--fc-red);letter-spacing:-0.04em;}
.fc-step__icon{position:absolute;top:24px;right:24px;width:36px;height:36px;border-radius:50%;background:var(--fc-danger-soft);color:var(--fc-red);display:grid;place-items:center;}
.fc-step--active{background:var(--fc-red);border-color:var(--fc-red);color:var(--fc-white);}
.fc-step--active .fc-step__num{color:var(--fc-white);}
.fc-step--active .fc-step__icon{background:rgba(255,255,255,0.15);color:var(--fc-white);}
.fc-step--active h4,.fc-step--active p{color:var(--fc-white);}
.fc-step--active p{color:rgba(255,255,255,0.9);}

/* ── INPUTS ───────────────────────────────────────────────── */
.fc-field{display:flex;flex-direction:column;gap:6px;}
.fc-input,.fc-select,.fc-textarea{
  appearance:none;height:48px;padding:0 16px;
  border-radius:var(--radius-sm);border:1.5px solid var(--border-soft);
  background:var(--fc-white);font:400 15px/1.4 var(--font-body);
  color:var(--fg-strong);transition:border-color var(--t-fast),box-shadow var(--t-fast);
}
.fc-input:focus,.fc-select:focus,.fc-textarea:focus{outline:none;border-color:var(--fc-red);box-shadow:0 0 0 4px rgba(216,38,42,0.14);}

/* Filter pill */
.fc-pill{display:inline-flex;align-items:center;padding:8px 18px;border-radius:var(--radius-pill);background:var(--fc-white);border:1.5px solid var(--border-soft);font:600 14px var(--font-display);color:var(--fg-strong);cursor:pointer;transition:all var(--t-fast) var(--ease-out);}
.fc-pill:hover{border-color:var(--fc-ink-400);}
.fc-pill--active{background:var(--fc-navy-900);border-color:var(--fc-navy-900);color:var(--fc-white);}

/* ── NAVBAR ───────────────────────────────────────────────── */
.fc-nav{height:72px;background:var(--fc-white);border-bottom:1px solid var(--border-soft);display:flex;align-items:center;padding:0 var(--gutter-desktop);position:sticky;top:0;z-index:50;}
.fc-nav__brand{display:flex;align-items:center;gap:12px;font-family:var(--font-display);font-weight:800;font-size:18px;color:var(--fc-ink-900);}
.fc-nav__brand img{height:38px;width:auto;}
.fc-nav__links{display:flex;align-items:center;gap:8px;margin:0 auto;}
.fc-nav__link{padding:8px 14px;border-radius:var(--radius-sm);font:500 14px var(--font-display);color:var(--fc-ink-700);position:relative;transition:color var(--t-fast) var(--ease-out);}
.fc-nav__link::after{content:"";position:absolute;left:14px;right:14px;bottom:-2px;height:3px;background:var(--fc-red);border-radius:2px;transform:scaleX(0);transform-origin:left center;transition:transform 280ms var(--ease-out),background var(--t-fast);}
.fc-nav__link:hover{background:var(--fc-ink-50);text-decoration:none;}
.fc-nav__link:hover::after{transform:scaleX(0.5);background:var(--fc-ink-400);}
.fc-nav__link--active{color:var(--fc-red);font-weight:700;}
.fc-nav__link--active::after{transform:scaleX(1);background:var(--fc-red);}
.fc-nav__cta{margin-left:12px;}
.fc-nav__menu-btn{display:none;background:transparent;border:0;cursor:pointer;width:40px;height:40px;border-radius:8px;}
.fc-nav__menu-btn:hover{background:var(--fc-ink-50);}
@media(max-width:900px){
  .fc-nav__links{display:none;}
  .fc-nav__menu-btn{display:grid;place-items:center;margin-left:auto;}
  .fc-nav__cta{display:none;}
}

/* ── TRUST BAR ────────────────────────────────────────────── */
.fc-trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--space-5);padding:var(--space-6) 0;border-block:1px solid var(--border-soft);}
.fc-trust__item{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;}
.fc-trust__icon{width:44px;height:44px;border-radius:50%;background:var(--fc-danger-soft);color:var(--fc-red);display:grid;place-items:center;}
.fc-trust__label{font:700 11px var(--font-display);letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-muted);}

/* ── KPI stat ─────────────────────────────────────────────── */
.fc-stat{display:flex;flex-direction:column;gap:4px;}
.fc-stat__value{font-family:var(--font-display);font-size:clamp(32px,4vw,48px);font-weight:800;line-height:1;letter-spacing:-0.02em;color:var(--fc-red);}
.fc-stat__label{font-size:13px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}

/* ── WhatsApp FAB ─────────────────────────────────────────── */
.fc-fab-whatsapp{position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;background:var(--fc-green);color:var(--fc-white);display:grid;place-items:center;box-shadow:0 10px 24px rgba(91,179,54,0.4);z-index:60;transition:transform var(--t-base) var(--ease-out);}
.fc-fab-whatsapp:hover{transform:scale(1.08);text-decoration:none;}

/* ── SECTION HELPERS ──────────────────────────────────────── */
.fc-section{padding:var(--section-y-mobile) var(--gutter-mobile);}
.fc-section--dark{background:var(--fc-navy-900);color:var(--fc-white);}
.fc-section--brand{background:var(--fc-red);color:var(--fc-white);}
.fc-section--subtle{background:var(--bg-subtle);}
.fc-container{max-width:var(--container-max);margin:0 auto;}
@media(min-width:900px){.fc-section{padding:var(--section-y-desktop) var(--gutter-desktop);}}

/* ── PAGE-LEVEL LAYOUT ────────────────────────────────────── */
.section{padding:80px var(--gutter-desktop);}
.section--subtle{background:var(--bg-subtle);}
.section--dark{background:var(--fc-navy-900);color:white;}
.section__inner{max-width:var(--container-max);margin:0 auto;}
.section__head{text-align:center;margin-bottom:48px;}
.section__head .fc-eyebrow{display:inline-block;margin-bottom:10px;}
.section__head h2{margin:0 auto 12px;max-width:700px;}
.section__head p{margin:0 auto;max-width:580px;color:var(--fg-muted);font-size:17px;}
.section--dark .section__head p{color:rgba(255,255,255,0.7);}
@media(max-width:720px){.section{padding:56px 16px;}}

/* ── GRIDS ────────────────────────────────────────────────── */
.grid-4{display:grid;gap:20px;grid-template-columns:repeat(4,1fr);}
.grid-3{display:grid;gap:20px;grid-template-columns:repeat(3,1fr);}
.grid-2{display:grid;gap:24px;grid-template-columns:repeat(2,1fr);}
@media(max-width:980px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:620px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

/* ── HERO ─────────────────────────────────────────────────── */
.kit-hero{position:relative;background:transparent;color:var(--fg-strong);border-bottom:1px solid var(--border-soft);overflow:hidden;}
.kit-hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(720px 320px at 0% 0%,rgba(216,38,42,0.04),transparent 70%);pointer-events:none;}
.kit-hero__inner{position:relative;max-width:var(--container-max);margin:0 auto;padding:96px var(--gutter-desktop) 104px;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,0.95fr);gap:64px;align-items:center;}

.fc-rotator__ghost{visibility:hidden;display:inline-block;}

.fc-rotator__word.is-leaving{opacity:0;transform:translateY(-110%);}
.fc-rotator::after{content:"";position:absolute;left:0;right:0;bottom:0;height:5px;background:var(--fc-yellow);border-radius:4px;}
@media(prefers-reduced-motion:reduce){.fc-rotator__word{transition:none;}}
.kit-hero p.lead{font-size:18px;line-height:1.6;color:var(--fg-muted);margin:0 0 32px;max-width:520px;}
.kit-hero__ctas{display:flex;gap:14px;flex-wrap:wrap;}
.kit-hero__visual{position:relative;aspect-ratio:5/4;border-radius:var(--radius-xl);background:#f0f0ee;overflow:visible;display:grid;place-items:center;box-shadow:var(--shadow-lg);}
.kit-hero__visual::before{content:none;}
.kit-hero__visual>i{display:none;}
@keyframes heroCarFloat{0%{transform:translate(-50%,-50%)}100%{transform:translate(calc(-50% - 10px),-50%) scale(1.03)}}
@keyframes heroShadowPulse{0%{opacity:0.20;transform:translateX(-50%) scaleX(1)}100%{opacity:0.12;transform:translateX(-50%) scaleX(0.88)}}
@keyframes heroLightSweep{0%{opacity:0;transform:translateX(-100%)}12%{opacity:1}88%{opacity:1}100%{opacity:0;transform:translateX(280%)}}
.hero-car-anim{animation:heroCarFloat 14s ease-in-out infinite alternate;will-change:transform;}
.hero-shadow-anim{animation:heroShadowPulse 14s ease-in-out infinite alternate;will-change:transform,opacity;}
.hero-light-anim{animation:heroLightSweep 10s ease-in-out infinite;will-change:transform,opacity;}

.kit-hero__visual .price-card{position:absolute;right:-18px;top:28px;background:var(--fc-red);color:white;padding:14px 18px;border-radius:var(--radius-md);box-shadow:var(--shadow-lg);font:700 11px var(--font-display);letter-spacing:0.1em;text-transform:uppercase;}
.kit-hero__visual .price-card strong{display:block;font-size:24px;letter-spacing:-0.01em;text-transform:none;margin-top:4px;}
.kit-hero__visual .trust-tag{position:absolute;bottom:20px;right:-20px;background:white;color:var(--fc-ink-900);padding:12px 16px;border-radius:var(--radius-md);box-shadow:var(--shadow-lg);font:700 13px var(--font-display);display:flex;align-items:center;gap:8px;border:1px solid var(--border-soft);}

/* Rotating word hero animation */
function RotatingWord({ words, interval=2200 }) {
  const [idx,setIdx] = React.useState(0);
  React.useEffect(()=>{
    const t = setTimeout(()=>setIdx((idx+1)%words.length),interval);
    return ()=>clearTimeout(t);
  },[idx,words.length,interval]);
  const widest = React.useMemo(()=>words.reduce((a,b)=>a.length>b.length?a:b,""),[words]);
  return (
    <span className="fc-rotator" aria-live="polite">
      <span className="fc-rotator__ghost">{widest}</span>
      {words.map((w,i)=>(
        <span key={i} className={"fc-rotator__word"+(i===idx?" is-active":(i===(idx-1+words.length)%words.length?" is-leaving":""))}>
          {w}
        </span>
      ))}
    </span>
  );
}

  );
}

/* ============================================================
   APP — hash router
   ============================================================ */
const ROUTES = {
  "home":          HomePage,
  "como-funciona": ComoFuncionaPage,
  "sobre":         SobrePage,
  "unidades":      UnidadesPage,
  "faq":           FaqPage,
  "franquia":      FranquiaPage,
};

function App() {
  const initial = (window.location.hash||"#home").replace("#","");
  const [page,setPage] = React.useState(ROUTES[initial]?initial:"home");

  React.useEffect(()=>{
    const onHash = ()=>{
      const id = (window.location.hash||"#home").replace("#","");
      if (ROUTES[id]) setPage(id);
    };
    window.addEventListener("hashchange",onHash);
    return ()=>window.removeEventListener("hashchange",onHash);
  },[]);

  const handleNav = (id)=>{
    if (!ROUTES[id]) return;
    window.location.hash = id;
    setPage(id);
    window.scrollTo({top:0,left:0,behavior:"smooth"});
  };

  const Page = ROUTES[page]||HomePage;
  return (
    <React.Fragment>
      <Nav current={page} onNav={handleNav}/>
      <main><Page onNav={handleNav}/></main>
      <Footer onNav={handleNav}/>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
