<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
</style></head>
<body>
  <div class="fc-field">
    <label class="fc-field__label">Marca</label>
    <input class="fc-input" placeholder="Ex: Volkswagen"/>
  </div>
  <div class="fc-field">
    <label class="fc-field__label">Ano</label>
    <input class="fc-input" value="2022" style="border-color: var(--fc-red); box-shadow: 0 0 0 4px rgba(249,48,49,0.15);"/>
  </div>
  <div class="fc-field">
    <label class="fc-field__label">Estado</label>
    <select class="fc-select"><option>São Paulo</option><option>Santa Catarina</option></select>
  </div>
  <div class="fc-field">
    <label class="fc-field__label">CPF (erro)</label>
    <input class="fc-input fc-input--error" value="000.000.00"/>
  </div>
</body></html>
