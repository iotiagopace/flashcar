<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row.dark { background: var(--fc-navy-900); padding: 14px 16px; border-radius: 10px; }
  .label { font: 600 10px var(--font-display); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-muted); width: 100%; }
</style></head>
<body>
  <div class="row">
    <span class="label">Primary CTAs (on light)</span>
    <button class="fc-btn fc-btn--primary">Agendar avaliação</button>
    <button class="fc-btn fc-btn--dark">Encontrar unidade</button>
    <button class="fc-btn fc-btn--ghost">Saber mais</button>
    <button class="fc-btn fc-btn--whatsapp">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.2-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-1.6-.8-2.7-1.4-3.7-3.2-.3-.5.3-.4.7-1.4.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1 2.9 1.2 3.1c.1.2 2 3.1 4.9 4.4 1.8.8 2.5.8 3.4.7.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.7.4 3.4 1.3 4.9L2 22l5.3-1.3c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
      WhatsApp
    </button>
  </div>
  <div class="row dark">
    <span class="label" style="color:rgba(255,255,255,0.6);">On dark surface</span>
    <button class="fc-btn fc-btn--primary">Quero ser franqueado</button>
    <button class="fc-btn fc-btn--inverse">Falar com especialista</button>
  </div>
  <div class="row">
    <span class="label">Sizes</span>
    <button class="fc-btn fc-btn--primary fc-btn--sm">Small</button>
    <button class="fc-btn fc-btn--primary">Default</button>
    <button class="fc-btn fc-btn--primary fc-btn--lg">Large hero</button>
  </div>
</body></html>
