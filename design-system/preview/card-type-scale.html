<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg-page); padding: 18px; font-family: var(--font-body); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border-soft); }
  th { font: 700 11px var(--font-display); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); }
  td.token { font-family: var(--font-mono); color: var(--fc-red); font-size: 12px; }
  td.sample { font-family: var(--font-display); color: var(--fg-strong); font-weight: 700; }
</style></head>
<body>
  <table>
    <thead><tr><th>Role</th><th>Size</th><th>Weight</th><th>Line</th><th>Sample</th></tr></thead>
    <tbody>
      <tr><td class="token">--fs-display</td><td>clamp 40–72</td><td>800</td><td>1.05</td><td class="sample" style="font-size:24px;">Aa</td></tr>
      <tr><td class="token">--fs-h1</td><td>clamp 32–52</td><td>800</td><td>1.2</td><td class="sample" style="font-size:22px;">Aa</td></tr>
      <tr><td class="token">--fs-h2</td><td>clamp 26–40</td><td>700</td><td>1.2</td><td class="sample" style="font-size:20px;">Aa</td></tr>
      <tr><td class="token">--fs-h3</td><td>clamp 22–30</td><td>700</td><td>1.2</td><td class="sample" style="font-size:18px;">Aa</td></tr>
      <tr><td class="token">--fs-body-lg</td><td>18</td><td>400</td><td>1.55</td><td style="font-size:14px;font-weight:400;color:var(--fg-default);">Aa</td></tr>
      <tr><td class="token">--fs-body</td><td>16</td><td>400</td><td>1.65</td><td style="font-size:13px;font-weight:400;color:var(--fg-default);">Aa</td></tr>
      <tr><td class="token">--fs-eyebrow</td><td>12</td><td>700</td><td>1.0</td><td style="font:700 11px var(--font-display);letter-spacing:0.14em;color:var(--fc-red);text-transform:uppercase;">AA</td></tr>
    </tbody>
  </table>
</body></html>
