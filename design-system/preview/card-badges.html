<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../components.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font: 600 10px var(--font-display); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-muted); width: 100%; }
</style></head>
<body>
  <div class="row">
    <span class="label">Solid (brand triad + dark)</span>
    <span class="fc-badge fc-badge--red">Top de mercado</span>
    <span class="fc-badge fc-badge--yellow">⚡ PIX 24 min</span>
    <span class="fc-badge fc-badge--green">Certificado</span>
    <span class="fc-badge fc-badge--dark">Oportunidade B2B</span>
  </div>
  <div class="row">
    <span class="label">Soft (status & inline)</span>
    <span class="fc-badge fc-badge--soft-red">Sede própria</span>
    <span class="fc-badge fc-badge--soft-green">Aprovado</span>
    <span class="fc-badge fc-badge--soft-yellow">Novo espaço</span>
    <span class="fc-badge fc-badge--outline">15 anos de experiência</span>
  </div>
</body></html>
