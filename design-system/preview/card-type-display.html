<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .row { display: flex; gap: 18px; align-items: baseline; padding: 14px 0; border-bottom: 1px solid var(--border-soft); }
  .row:last-child { border: 0; }
  .meta { font: 600 11px var(--font-display); color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; min-width: 110px; }
  .specimen { font-family: var(--font-display); color: var(--fg-strong); letter-spacing: -0.02em; line-height: 1.05; }
  .d1 { font-size: 56px; font-weight: 800; }
  .d2 { font-size: 40px; font-weight: 800; }
  .d3 { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
  .accent { color: var(--fc-red); }
</style></head>
<body>
  <div class="row"><div class="meta">Display · 56 / 800</div><div class="specimen d1">Venda em <span class="accent">60 min</span></div></div>
  <div class="row"><div class="meta">H1 · 40 / 800</div><div class="specimen d2">Como facilitamos sua venda</div></div>
  <div class="row"><div class="meta">H2 · 28 / 700</div><div class="specimen d3">Diferenciais Flash Car</div></div>
</body></html>
