<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
  .heading { font: 700 11px var(--font-display); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-muted); margin: 0 0 10px; }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(6, 1fr); margin-bottom: 18px; }
  .tile { background: white; height: 70px; display: grid; place-items: center; border: 1px solid var(--border-soft); font: 600 12px var(--font-display); color: var(--fg-strong); }
  .r-xs { border-radius: 4px; }
  .r-sm { border-radius: 8px; }
  .r-md { border-radius: 12px; }
  .r-lg { border-radius: 16px; }
  .r-xl { border-radius: 24px; }
  .r-pill { border-radius: 999px; }
  .sgrid { display: grid; gap: 16px; grid-template-columns: repeat(4, 1fr); }
  .stile { background: white; height: 80px; border-radius: 12px; display: grid; place-items: center; font: 600 11px var(--font-display); color: var(--fg-strong); letter-spacing: 0.04em; }
  .sh-sm { box-shadow: var(--shadow-sm); }
  .sh-md { box-shadow: var(--shadow-md); }
  .sh-lg { box-shadow: var(--shadow-lg); }
  .sh-cta { box-shadow: var(--shadow-cta); background: var(--fc-red); color: white; }
</style></head>
<body>
  <div class="heading">Radii</div>
  <div class="grid">
    <div class="tile r-xs">4 · xs</div>
    <div class="tile r-sm">8 · sm</div>
    <div class="tile r-md">12 · md</div>
    <div class="tile r-lg">16 · lg</div>
    <div class="tile r-xl">24 · xl</div>
    <div class="tile r-pill">pill</div>
  </div>
  <div class="heading">Shadows</div>
  <div class="sgrid">
    <div class="stile sh-sm">SM</div>
    <div class="stile sh-md">MD</div>
    <div class="stile sh-lg">LG</div>
    <div class="stile sh-cta">CTA glow</div>
  </div>
</body></html>
